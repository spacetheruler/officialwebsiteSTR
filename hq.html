<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE HQ</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --p: #D9437A; --p2: #F272AE; --pd: #A6123A;
  --void: #060305; --s: #0d080b; --s2: #160c10;
  --w: #f8f4f6; --ch: #c8c8d4; --dim: #7a6a70;
  --err: #e05070; --ok: #4ade80; --warn: #f59e0b;
}
html, body { height: 100%; }
body { background: var(--void); color: var(--w); font-family: "Space Grotesk", sans-serif; min-height: 100vh; }

/* ─── LOGIN ─── */
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-card { width:100%; max-width:400px; padding:52px 44px; background:var(--s); border:1px solid rgba(217,67,122,.18); }
.login-brand { text-align:center; margin-bottom:36px; }
.login-brand-name { font-family:"Orbitron",monospace; font-size:11px; letter-spacing:.45em; color:var(--p); text-transform:uppercase; display:block; margin-bottom:5px; }
.login-brand-sub { font-size:9px; letter-spacing:.28em; color:var(--dim); text-transform:uppercase; }
.login-title { font-family:"Orbitron",monospace; font-size:13px; font-weight:700; letter-spacing:.2em; color:var(--w); text-align:center; margin-bottom:32px; text-transform:uppercase; }
.field { margin-bottom:18px; }
.field label { font-family:"Orbitron",monospace; font-size:7px; letter-spacing:.28em; color:var(--dim); text-transform:uppercase; display:block; margin-bottom:8px; }
.field input, .field select, .field textarea {
  width:100%; padding:12px 14px; background:rgba(255,255,255,.04);
  border:1px solid rgba(217,67,122,.18); color:var(--w); font-size:13px;
  font-family:"Space Grotesk",sans-serif; outline:none; transition:border-color .25s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color:rgba(217,67,122,.5); background:rgba(217,67,122,.04); }
.field input::placeholder, .field textarea::placeholder { color:var(--dim); }
.field select option { background:#0d080b; }
.field textarea { resize:vertical; min-height:72px; }
.input-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.login-btn { width:100%; padding:14px; margin-top:8px; background:var(--p); border:1px solid var(--p); font-family:"Orbitron",monospace; font-size:8px; letter-spacing:.28em; color:var(--void); text-transform:uppercase; cursor:pointer; transition:all .3s; }
.login-btn:hover { background:var(--p2); border-color:var(--p2); }
.login-btn:disabled { opacity:.5; cursor:not-allowed; }
.login-error { font-size:11px; color:var(--err); letter-spacing:.04em; margin-top:12px; padding:8px 12px; border:1px solid rgba(224,80,112,.25); background:rgba(224,80,112,.06); display:none; }
.login-error.show { display:block; }
.back-link { display:block; text-align:center; margin-top:20px; font-size:11px; color:var(--dim); text-decoration:none; transition:color .25s; }
.back-link:hover { color:var(--p); }

/* ─── APP ─── */
.app { display:none; min-height:100vh; }
.app.show { display:flex; }

/* Sidebar */
.sidebar { width:224px; min-height:100vh; background:var(--s); border-right:1px solid rgba(217,67,122,.1); flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow:hidden; }
.sb-hdr { padding:28px 24px 22px; border-bottom:1px solid rgba(217,67,122,.08); }
.sb-brand { font-family:"Orbitron",monospace; font-size:9px; letter-spacing:.3em; color:var(--p); text-transform:uppercase; display:block; margin-bottom:4px; }
.sb-project { font-size:10px; color:var(--dim); }
.sb-nav { flex:1; padding:14px 0; overflow-y:auto; }
.sb-section-label { font-family:"Orbitron",monospace; font-size:6.5px; letter-spacing:.3em; color:var(--dim); text-transform:uppercase; padding:12px 24px 6px; }
.sb-item { display:flex; align-items:center; gap:10px; padding:10px 24px; cursor:pointer; transition:all .2s; font-size:12px; color:var(--dim); letter-spacing:.04em; border-left:2px solid transparent; }
.sb-item:hover { background:rgba(217,67,122,.05); color:var(--ch); }
.sb-item.active { background:rgba(217,67,122,.08); color:var(--p); border-left-color:var(--p); }
.sb-item svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.8; flex-shrink:0; }
.sb-footer { padding:16px 24px; border-top:1px solid rgba(217,67,122,.08); }
.sb-user { font-size:10px; color:var(--dim); margin-bottom:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-logout { width:100%; padding:9px; background:transparent; border:1px solid rgba(217,67,122,.2); font-family:"Orbitron",monospace; font-size:7px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; cursor:pointer; transition:all .25s; }
.sb-logout:hover { border-color:var(--p); color:var(--p); }

/* Main */
.main { flex:1; padding:48px 52px; overflow-y:auto; }
.page-hdr { margin-bottom:36px; }
.page-hdr h1 { font-family:"Orbitron",monospace; font-size:13px; font-weight:700; letter-spacing:.25em; color:var(--w); text-transform:uppercase; margin-bottom:6px; }
.page-hdr p { font-size:12px; color:var(--dim); letter-spacing:.05em; }

/* Cards */
.card { background:var(--s); border:1px solid rgba(217,67,122,.1); padding:28px; margin-bottom:20px; }
.card-title { font-family:"Orbitron",monospace; font-size:8px; letter-spacing:.3em; color:var(--p); text-transform:uppercase; margin-bottom:16px; display:block; }

/* Overview grid */
.ov-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:2px; background:rgba(217,67,122,.06); margin-bottom:28px; }
.ov-card { background:var(--s); padding:22px 18px; text-align:center; }
.ov-n { font-family:"Orbitron",monospace; font-size:26px; font-weight:700; color:var(--w); line-height:1; margin-bottom:5px; }
.ov-l { font-size:7.5px; letter-spacing:.2em; color:var(--dim); text-transform:uppercase; }

/* Stats editor */
.stats-grid { display:flex; flex-direction:column; gap:2px; margin-bottom:24px; }
.stat-row { display:grid; grid-template-columns:200px 1fr 110px; background:var(--s); transition:background .2s; }
.stat-row:hover { background:var(--s2); }
.sr-label { padding:13px 16px; font-size:11px; color:var(--ch); border-right:1px solid rgba(217,67,122,.06); }
.sr-key { font-family:"Orbitron",monospace; font-size:6.5px; color:var(--dim); letter-spacing:.1em; display:block; margin-top:2px; }
.sr-input { padding:0 16px; }
.sr-input input { width:100%; padding:9px 12px; background:transparent; border:1px solid transparent; color:var(--w); font-size:14px; font-family:"Orbitron",monospace; font-weight:600; outline:none; transition:all .2s; }
.sr-input input:focus { border-color:rgba(217,67,122,.4); background:rgba(217,67,122,.04); }
.sr-input input.changed { color:var(--p2); border-color:rgba(217,67,122,.25); }
.sr-updated { padding:13px 16px; font-size:8.5px; color:var(--dim); text-align:right; border-left:1px solid rgba(217,67,122,.06); }
.cat-label { font-family:"Orbitron",monospace; font-size:7px; letter-spacing:.35em; color:var(--p); text-transform:uppercase; margin:24px 0 10px; padding-bottom:8px; border-bottom:1px solid rgba(217,67,122,.1); display:block; }
.cat-label:first-child { margin-top:0; }

/* Theme cards */
.theme-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-bottom:28px; }
.theme-card { background:var(--s); border:1px solid rgba(217,67,122,.12); padding:0; overflow:hidden; position:relative; transition:all .3s; cursor:pointer; }
.theme-card:hover { border-color:rgba(217,67,122,.35); transform:translateY(-2px); }
.theme-card.active-theme { border-color:var(--p); box-shadow:0 0 20px rgba(217,67,122,.15); }
.tc-preview { height:80px; position:relative; display:flex; align-items:center; justify-content:center; }
.tc-preview-orb { width:40px; height:40px; border-radius:50%; filter:blur(8px); position:absolute; opacity:.6; }
.tc-preview-label { font-family:"Orbitron",monospace; font-size:7px; letter-spacing:.22em; color:rgba(255,255,255,.7); text-transform:uppercase; position:relative; z-index:1; }
.tc-body { padding:16px 18px 18px; }
.tc-name { font-family:"Orbitron",monospace; font-size:10px; font-weight:700; letter-spacing:.18em; color:var(--w); margin-bottom:3px; text-transform:uppercase; }
.tc-era { font-size:10px; color:var(--dim); margin-bottom:12px; }
.tc-active-badge { display:inline-block; font-family:"Orbitron",monospace; font-size:6px; letter-spacing:.2em; padding:3px 9px; background:rgba(217,67,122,.12); border:1px solid rgba(217,67,122,.3); color:var(--p); text-transform:uppercase; margin-bottom:12px; }
.tc-colors { display:flex; gap:6px; margin-bottom:14px; }
.tc-swatch { width:20px; height:20px; border-radius:50%; border:1px solid rgba(255,255,255,.1); }
.tc-actions { display:flex; gap:8px; }
.tc-btn { padding:7px 14px; font-family:"Orbitron",monospace; font-size:6.5px; letter-spacing:.18em; text-transform:uppercase; cursor:pointer; transition:all .25s; border:1px solid; flex:1; text-align:center; }
.tc-btn-activate { background:var(--p); border-color:var(--p); color:var(--void); }
.tc-btn-activate:hover { background:var(--p2); border-color:var(--p2); }
.tc-btn-activate:disabled { opacity:.4; cursor:not-allowed; }
.tc-btn-edit { background:transparent; border-color:rgba(217,67,122,.25); color:var(--p); }
.tc-btn-edit:hover { background:rgba(217,67,122,.08); border-color:var(--p); }

/* Theme editor modal */
.modal-overlay { position:fixed; inset:0; background:rgba(5,2,4,.88); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s; backdrop-filter:blur(8px); }
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal { width:100%; max-width:680px; max-height:90vh; background:var(--s); border:1px solid rgba(217,67,122,.2); overflow-y:auto; }
.modal-hdr { padding:22px 28px; border-bottom:1px solid rgba(217,67,122,.1); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--s); z-index:1; }
.modal-title { font-family:"Orbitron",monospace; font-size:9px; letter-spacing:.28em; color:var(--p); text-transform:uppercase; }
.modal-close { width:28px; height:28px; border-radius:50%; border:1px solid rgba(217,67,122,.25); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--dim); transition:all .25s; background:none; }
.modal-close:hover { background:rgba(217,67,122,.08); color:var(--p); border-color:var(--p); }
.modal-body { padding:28px; }
.modal-section { margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid rgba(217,67,122,.08); }
.modal-section:last-child { border-bottom:none; margin-bottom:0; }
.modal-section-label { font-family:"Orbitron",monospace; font-size:7px; letter-spacing:.3em; color:var(--p); text-transform:uppercase; margin-bottom:16px; display:block; }
.color-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.color-field label { font-family:"Orbitron",monospace; font-size:6.5px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; display:block; margin-bottom:6px; }
.color-input-wrap { display:flex; align-items:center; gap:8px; }
.color-input-wrap input[type="color"] { width:36px; height:36px; border:1px solid rgba(217,67,122,.2); background:none; cursor:pointer; padding:2px; border-radius:2px; }
.color-input-wrap input[type="text"] { flex:1; padding:9px 12px; background:rgba(255,255,255,.04); border:1px solid rgba(217,67,122,.18); color:var(--w); font-size:12px; font-family:"Space Grotesk",sans-serif; outline:none; }
.color-input-wrap input[type="text"]:focus { border-color:rgba(217,67,122,.5); }
.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; }
.toggle-row-label { font-size:12px; color:var(--ch); }
.toggle { width:36px; height:20px; border-radius:10px; background:rgba(217,67,122,.15); border:1px solid rgba(217,67,122,.2); cursor:pointer; position:relative; transition:all .3s; flex-shrink:0; }
.toggle.on { background:var(--p); border-color:var(--p); }
.toggle::after { content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:var(--w); transition:transform .3s; }
.toggle.on::after { transform:translateX(16px); }

/* Action bar */
.action-bar { position:sticky; bottom:0; background:rgba(6,3,5,.96); border-top:1px solid rgba(217,67,122,.15); padding:14px 52px; display:flex; align-items:center; justify-content:space-between; backdrop-filter:blur(10px); margin:0 -52px; }
.changes-count { font-size:11px; color:var(--dim); }
.changes-count span { color:var(--p); font-weight:600; }
.btn-row { display:flex; gap:10px; }
.btn { padding:10px 24px; font-family:"Orbitron",monospace; font-size:7.5px; letter-spacing:.2em; text-transform:uppercase; cursor:pointer; transition:all .25s; border:1px solid; }
.btn-primary { background:var(--p); border-color:var(--p); color:var(--void); }
.btn-primary:hover { background:var(--p2); border-color:var(--p2); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-secondary { background:transparent; border-color:rgba(217,67,122,.25); color:var(--dim); }
.btn-secondary:hover { border-color:rgba(217,67,122,.5); color:var(--ch); }

/* Toast */
.toast { position:fixed; bottom:72px; right:24px; padding:13px 22px; font-family:"Orbitron",monospace; font-size:8px; letter-spacing:.2em; text-transform:uppercase; transform:translateX(calc(100% + 32px)); transition:transform .35s cubic-bezier(.16,1,.3,1); z-index:999; max-width:320px; }
.toast.show { transform:translateX(0); }
.toast.success { background:rgba(74,222,128,.12); border:1px solid rgba(74,222,128,.3); color:var(--ok); }
.toast.error { background:rgba(224,80,112,.12); border:1px solid rgba(224,80,112,.3); color:var(--err); }
.toast.info { background:rgba(217,67,122,.12); border:1px solid rgba(217,67,122,.3); color:var(--p2); }

/* Add theme button */
.add-theme-btn { width:100%; padding:16px; background:transparent; border:1px dashed rgba(217,67,122,.25); font-family:"Orbitron",monospace; font-size:8px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; cursor:pointer; transition:all .3s; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:24px; }
.add-theme-btn:hover { border-color:var(--p); color:var(--p); background:rgba(217,67,122,.04); }

/* Storage guide */
.storage-bucket { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--s); border:1px solid rgba(217,67,122,.08); margin-bottom:2px; }
.bucket-icon { font-size:18px; }
.bucket-name { font-family:"Orbitron",monospace; font-size:9px; letter-spacing:.15em; color:var(--w); display:block; margin-bottom:2px; }
.bucket-desc { font-size:10px; color:var(--dim); }
.bucket-status { margin-left:auto; font-family:"Orbitron",monospace; font-size:7px; letter-spacing:.15em; padding:3px 10px; }
.bucket-status.pending { color:var(--warn); border:1px solid rgba(245,158,11,.25); background:rgba(245,158,11,.06); }

@media(max-width:780px) {
  .sidebar { width:180px; }
  .main { padding:32px 24px; }
  .action-bar { margin:0 -24px; padding:12px 24px; }
  .stat-row { grid-template-columns:150px 1fr 90px; }
}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <span class="login-brand-name">SPACE THE RULER</span>
      <span class="login-brand-sub">Digital Headquarters</span>
    </div>
    <div class="login-title">SPACE HQ</div>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Enter SPACE HQ</button>
    <div class="login-error" id="login-error"></div>
    <a href="/" class="back-link">← Back to spacetheruler.com</a>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="sb-hdr">
      <span class="sb-brand">Space HQ</span>
      <span class="sb-project">officialwebsiteSTR</span>
    </div>
    <nav class="sb-nav">
      <div class="sb-section-label">Overview</div>
      <div class="sb-item active" onclick="showPage('dashboard')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
      </div>
      <div class="sb-section-label">Content</div>
      <div class="sb-item" onclick="showPage('stats')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Statistics
      </div>
      <div class="sb-section-label">Design</div>
      <div class="sb-item" onclick="showPage('themes')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2C6.5 2 2 6.5 2 12"/></svg>Era Engine
      </div>
      <div class="sb-item" onclick="showPage('storage')">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Storage
      </div>
    </nav>
    <div class="sb-footer">
      <div class="sb-user" id="sb-user"></div>
      <button class="sb-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- Theme Editor Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="modal-title">Edit Theme</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://fflsclnwjbdavgzwllqn.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_aqZ8MOPo7tLFLrLLZ8tKBw_yQT81vGf';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allStats = [];
let allThemes = [];
let changedKeys = new Set();
let currentPage = 'dashboard';
let editingTheme = null;

// ─── AUTH ───
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!email || !pw) { showLoginErr('Enter email and password.'); return; }
  btn.disabled = true; btn.textContent = 'Authenticating...';
  err.classList.remove('show');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { showLoginErr(error.message); btn.disabled=false; btn.textContent='Enter SPACE HQ'; return; }
  await enterApp(data.session);
}

function showLoginErr(msg) {
  const e = document.getElementById('login-error');
  e.textContent = msg; e.classList.add('show');
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
  allStats=[]; allThemes=[]; changedKeys.clear();
}

async function enterApp(session) {
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('sb-user').textContent = session.user.email;
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent='Enter SPACE HQ';
  await Promise.all([loadStats(), loadThemes()]);
  showPage('dashboard');
}

// ─── DATA ───
async function loadStats() {
  const { data } = await sb.from('stats').select('*').order('display_order');
  allStats = data || [];
}

async function loadThemes() {
  const { data } = await sb.from('themes').select('*').order('created_at');
  allThemes = data || [];
}

function getStatValue(key) {
  const s = allStats.find(x => x.key === key);
  return s ? s.value : '0';
}

function fmt(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// ─── PAGES ───
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.sb-item[onclick*="${page}"]`)?.classList.add('active');
  const pages = { dashboard: renderDashboard, stats: renderStats, themes: renderThemes, storage: renderStorage };
  if (pages[page]) pages[page]();
}

// ─── DASHBOARD ───
function renderDashboard() {
  const keys = [
    {key:'total_songs',label:'Songs'}, {key:'total_projects',label:'Projects'},
    {key:'total_global_views',label:'Views'}, {key:'total_businesses',label:'Businesses'},
    {key:'countries_reached',label:'Countries'}, {key:'performances',label:'Shows'},
  ];
  const activeTheme = allThemes.find(t => t.is_active);
  const lastStat = allStats.length ? allStats.reduce((a,b) => a.updated_at > b.updated_at ? a : b) : null;

  document.getElementById('main').innerHTML = `
    <div class="page-hdr"><h1>Dashboard</h1><p>Live overview · ${fmt(lastStat?.updated_at)}</p></div>
    <div class="ov-grid">${keys.map(s=>`<div class="ov-card"><div class="ov-n">${parseInt(getStatValue(s.key))||0}</div><div class="ov-l">${s.label}</div></div>`).join('')}</div>
    <div class="card">
      <span class="card-title">Active Era</span>
      ${activeTheme ? `
        <div style="display:flex;align-items:center;gap:16px;">
          <div style="width:48px;height:48px;border-radius:50%;background:${activeTheme.color_primary};box-shadow:0 0 20px ${activeTheme.color_primary}44;flex-shrink:0;"></div>
          <div>
            <div style="font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--w);letter-spacing:.15em;margin-bottom:4px;">${activeTheme.name}</div>
            <div style="font-size:11px;color:var(--dim);">${activeTheme.description||'No description'}</div>
          </div>
          <button class="btn btn-secondary" style="margin-left:auto;" onclick="showPage('themes')">Switch Era →</button>
        </div>` : '<p style="font-size:12px;color:var(--dim);">No active theme. Go to Era Engine to activate one.</p>'}
    </div>
    <div class="card">
      <span class="card-title">Quick Actions</span>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="showPage('stats')">Edit Statistics</button>
        <button class="btn btn-primary" onclick="showPage('themes')">Era Engine</button>
        <a href="/" target="_blank" style="padding:10px 24px;border:1px solid rgba(217,67,122,.25);font-family:'Orbitron',monospace;font-size:7.5px;letter-spacing:.2em;color:var(--p);text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;transition:all .25s;" onmouseover="this.style.background='rgba(217,67,122,.08)'" onmouseout="this.style.background='transparent'">View Site ↗</a>
      </div>
    </div>
  `;
}

// ─── STATS ───
function renderStats() {
  const cats = [
    {key:'profile',label:'Profile'},
    {key:'music',label:'Music'},
    {key:'audience',label:'Audience'},
    {key:'performance',label:'Performance'},
    {key:'world',label:'World Building'},
  ];
  let html = `<div class="page-hdr"><h1>Statistics</h1><p>Changes update the public website immediately after saving</p></div>`;
  cats.forEach(cat => {
    const rows = allStats.filter(s => s.category === cat.key);
    if (!rows.length) return;
    html += `<span class="cat-label">${cat.label}</span><div class="stats-grid">`;
    rows.forEach(s => {
      html += `<div class="stat-row">
        <div class="sr-label">${s.label}<span class="sr-key">${s.key}</span></div>
        <div class="sr-input"><input type="text" id="inp-${s.key}" value="${s.value}" data-original="${s.value}" data-key="${s.key}" oninput="onStatChange(this)" onkeydown="if(event.key==='Enter')saveStats()"></div>
        <div class="sr-updated" id="upd-${s.key}">${fmt(s.updated_at)}</div>
      </div>`;
    });
    html += `</div>`;
  });
  html += `<div class="action-bar">
    <div class="changes-count" id="ch-count">No unsaved changes</div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="discardStats()">Discard</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveStats()" disabled>Save Changes</button>
    </div>
  </div>`;
  document.getElementById('main').innerHTML = html;
  changedKeys.clear(); updateChangesUI();
}

function onStatChange(input) {
  const key = input.dataset.key;
  if (input.value !== input.dataset.original) { changedKeys.add(key); input.classList.add('changed'); }
  else { changedKeys.delete(key); input.classList.remove('changed'); }
  updateChangesUI();
}

function updateChangesUI() {
  const n = changedKeys.size;
  const cl = document.getElementById('ch-count');
  const sb2 = document.getElementById('save-btn');
  if (!cl || !sb2) return;
  cl.innerHTML = n === 0 ? 'No unsaved changes' : `<span>${n}</span> unsaved change${n!==1?'s':''}`;
  sb2.disabled = n === 0;
}

async function saveStats() {
  const btn = document.getElementById('save-btn');
  if (!btn || changedKeys.size === 0) return;
  btn.disabled=true; btn.textContent='Saving...';
  const now = new Date().toISOString();
  try {
    const ups = [...changedKeys].map(key => {
      const inp = document.getElementById('inp-'+key);
      return sb.from('stats').update({value:inp.value, updated_at:now}).eq('key',key);
    });
    const results = await Promise.all(ups);
    const errs = results.filter(r=>r.error);
    if (errs.length) throw new Error(errs[0].error.message);
    changedKeys.forEach(key => {
      const inp = document.getElementById('inp-'+key);
      if (inp) { inp.dataset.original=inp.value; inp.classList.remove('changed'); }
      const s = allStats.find(x=>x.key===key);
      if (s) { s.value=inp?.value; s.updated_at=now; }
      const upd = document.getElementById('upd-'+key);
      if (upd) upd.textContent = fmt(now);
    });
    changedKeys.clear(); updateChangesUI();
    showToast('Statistics saved', 'success');
  } catch(e) { showToast('Save failed: '+e.message, 'error'); }
  finally { btn.textContent='Save Changes'; btn.disabled=changedKeys.size===0; }
}

function discardStats() {
  changedKeys.forEach(key => {
    const inp = document.getElementById('inp-'+key);
    if (inp) { inp.value=inp.dataset.original; inp.classList.remove('changed'); }
  });
  changedKeys.clear(); updateChangesUI();
}

// ─── ERA ENGINE / THEMES ───
function renderThemes() {
  let html = `
    <div class="page-hdr"><h1>Era Engine</h1><p>Activate an era to instantly update the entire visual identity of the public website</p></div>
    <button class="add-theme-btn" onclick="openNewThemeModal()">+ Create New Era Theme</button>
    <div class="theme-grid">
  `;
  allThemes.forEach(theme => {
    const isActive = theme.is_active;
    html += `
      <div class="theme-card ${isActive?'active-theme':''}">
        <div class="tc-preview" style="background:${theme.color_background||'#060305'};">
          <div class="tc-preview-orb" style="background:${theme.color_primary};top:10px;left:30px;"></div>
          <div class="tc-preview-orb" style="background:${theme.color_secondary};bottom:5px;right:20px;width:28px;height:28px;"></div>
          <span class="tc-preview-label">${theme.season_era||theme.name}</span>
        </div>
        <div class="tc-body">
          ${isActive ? '<div class="tc-active-badge">Active Era</div>' : ''}
          <div class="tc-name">${theme.name}</div>
          <div class="tc-era">${theme.description||'No description'}</div>
          <div class="tc-colors">
            <div class="tc-swatch" style="background:${theme.color_primary};" title="Primary"></div>
            <div class="tc-swatch" style="background:${theme.color_secondary};" title="Secondary"></div>
            <div class="tc-swatch" style="background:${theme.color_accent};" title="Accent"></div>
            <div class="tc-swatch" style="background:${theme.color_background};" title="Background"></div>
          </div>
          <div class="tc-actions">
            <button class="tc-btn tc-btn-activate" ${isActive?'disabled':''} onclick="activateTheme('${theme.id}','${theme.name}')">${isActive?'Active':'Activate'}</button>
            <button class="tc-btn tc-btn-edit" onclick="openEditThemeModal('${theme.id}')">Edit</button>
          </div>
        </div>
      </div>
    `;
  });
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

async function activateTheme(id, name) {
  showToast('Activating ' + name + '...', 'info');
  const { error } = await sb.from('themes').update({is_active:true, updated_at:new Date().toISOString()}).eq('id',id);
  if (error) { showToast('Failed: '+error.message,'error'); return; }
  await loadThemes();
  renderThemes();
  showToast(name + ' is now active', 'success');
}

function openNewThemeModal() {
  editingTheme = null;
  document.getElementById('modal-title').textContent = 'Create New Era Theme';
  renderThemeForm(null);
  document.getElementById('modal-overlay').classList.add('show');
}

function openEditThemeModal(id) {
  editingTheme = allThemes.find(t => t.id === id);
  document.getElementById('modal-title').textContent = 'Edit Theme · ' + (editingTheme?.name||'');
  renderThemeForm(editingTheme);
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  editingTheme = null;
}

function renderThemeForm(theme) {
  const v = (field, fallback='') => theme ? (theme[field]||fallback) : fallback;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <span class="modal-section-label">Identity</span>
      <div class="field"><label>Theme Name</label><input type="text" id="tf-name" value="${v('name')}" placeholder="e.g. Mars Era"></div>
      <div class="field"><label>Season / Era</label><input type="text" id="tf-era" value="${v('season_era')}" placeholder="e.g. Mars"></div>
      <div class="field"><label>Description</label><textarea id="tf-desc" placeholder="What defines this era?">${v('description')}</textarea></div>
    </div>
    <div class="modal-section">
      <span class="modal-section-label">Colors</span>
      <div class="color-grid">
        ${colorField('Primary','tf-color-p', v('color_primary','#D9437A'))}
        ${colorField('Secondary','tf-color-s', v('color_secondary','#F272AE'))}
        ${colorField('Accent','tf-color-a', v('color_accent','#A6123A'))}
        ${colorField('Background','tf-color-bg', v('color_background','#060305'))}
        ${colorField('Surface','tf-color-sf', v('color_surface','#0c0709'))}
      </div>
    </div>
    <div class="modal-section">
      <span class="modal-section-label">Backgrounds</span>
      <div class="field"><label>Desktop Wallpaper URL</label><input type="text" id="tf-wp-desktop" value="${v('wallpaper_desktop_url')}" placeholder="https://... (from Supabase Storage)"></div>
      <div class="field"><label>Mobile Wallpaper URL</label><input type="text" id="tf-wp-mobile" value="${v('wallpaper_mobile_url')}" placeholder="https://... (optional)"></div>
      <div class="field"><label>Background Video URL</label><input type="text" id="tf-video" value="${v('video_background_url')}" placeholder="https://... (optional)"></div>
      <div class="field"><label>Overlay Opacity (0.0 – 1.0)</label><input type="number" id="tf-opacity" value="${v('overlay_opacity','0.6')}" min="0" max="1" step="0.05"></div>
    </div>
    <div class="modal-section">
      <span class="modal-section-label">Effects</span>
      <div class="toggle-row"><span class="toggle-row-label">Particle Effect</span><div class="toggle ${v('particle_effect')?'on':''}" id="tf-particles" onclick="this.classList.toggle('on')"></div></div>
      <div class="field" style="margin-top:14px;"><label>Animation Style</label>
        <select id="tf-anim">
          <option value="default" ${v('animation_style')==='default'?'selected':''}>Default</option>
          <option value="slow" ${v('animation_style')==='slow'?'selected':''}>Slow & Cinematic</option>
          <option value="fast" ${v('animation_style')==='fast'?'selected':''}>Fast & Energetic</option>
        </select>
      </div>
      <div class="field"><label>Logo Variant</label>
        <select id="tf-logo">
          <option value="chrome" ${v('logo_variant')==='chrome'?'selected':''}>Chrome</option>
          <option value="diamond" ${v('logo_variant')==='diamond'?'selected':''}>Diamond</option>
          <option value="gold" ${v('logo_variant')==='gold'?'selected':''}>Gold</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:8px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTheme()">${editingTheme?'Save Theme':'Create Theme'}</button>
    </div>
  `;
}

function colorField(label, id, value) {
  return `<div class="color-field">
    <label>${label}</label>
    <div class="color-input-wrap">
      <input type="color" id="${id}-picker" value="${value}" oninput="document.getElementById('${id}').value=this.value">
      <input type="text" id="${id}" value="${value}" maxlength="7" oninput="syncColor(this,'${id}-picker')">
    </div>
  </div>`;
}

function syncColor(input, pickerId) {
  if (/^#[0-9A-Fa-f]{6}$/.test(input.value)) {
    document.getElementById(pickerId).value = input.value;
  }
}

async function saveTheme() {
  const name = document.getElementById('tf-name').value.trim();
  if (!name) { showToast('Theme name is required','error'); return; }

  const payload = {
    name,
    season_era: document.getElementById('tf-era').value.trim()||null,
    description: document.getElementById('tf-desc').value.trim()||null,
    color_primary: document.getElementById('tf-color-p').value,
    color_secondary: document.getElementById('tf-color-s').value,
    color_accent: document.getElementById('tf-color-a').value,
    color_background: document.getElementById('tf-color-bg').value,
    color_surface: document.getElementById('tf-color-sf').value,
    wallpaper_desktop_url: document.getElementById('tf-wp-desktop').value.trim()||null,
    wallpaper_mobile_url: document.getElementById('tf-wp-mobile').value.trim()||null,
    video_background_url: document.getElementById('tf-video').value.trim()||null,
    overlay_opacity: parseFloat(document.getElementById('tf-opacity').value)||0.6,
    particle_effect: document.getElementById('tf-particles').classList.contains('on'),
    animation_style: document.getElementById('tf-anim').value,
    logo_variant: document.getElementById('tf-logo').value,
    updated_at: new Date().toISOString(),
  };

  let error;
  if (editingTheme) {
    ({ error } = await sb.from('themes').update(payload).eq('id', editingTheme.id));
  } else {
    ({ error } = await sb.from('themes').insert(payload));
  }

  if (error) { showToast('Save failed: '+error.message,'error'); return; }
  showToast(editingTheme ? 'Theme updated' : 'Theme created', 'success');
  closeModal();
  await loadThemes();
  renderThemes();
}

// ─── TOAST ───
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3500);
}

// ─── INIT ───
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key==='Enter') doLogin();
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) await enterApp(session);
})();
